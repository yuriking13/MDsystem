<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Thin Line - Brain</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            background: #000;
        }
        
        .title {
            position: absolute;
            bottom: 60px;
            color: #888;
            font-size: 18px;
            letter-spacing: 8px;
            font-weight: 300;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="title">ULTRA THIN LINE</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Brain parameters
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const scale = Math.min(canvas.width, canvas.height) * 0.25;
        
        // Generate brain-like structure using Perlin noise simulation
        class PerlinNoise {
            constructor(seed = 0) {
                this.permutation = this.buildPermutation(seed);
                this.p = [...this.permutation, ...this.permutation];
            }
            
            buildPermutation(seed) {
                const p = Array.from({length: 256}, (_, i) => i);
                // Shuffle using seed
                for (let i = 255; i > 0; i--) {
                    const j = Math.floor(((i + 1) * seed % 256 + i) % (i + 1));
                    [p[i], p[j]] = [p[j], p[i]];
                }
                return p;
            }
            
            fade(t) {
                return t * t * t * (t * (t * 6 - 15) + 10);
            }
            
            lerp(t, a, b) {
                return a + t * (b - a);
            }
            
            grad(hash, x, y) {
                const h = hash & 15;
                const u = h < 8 ? x : y;
                const v = h < 8 ? y : x;
                return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
            }
            
            noise(x, y) {
                const xi = Math.floor(x) & 255;
                const yi = Math.floor(y) & 255;
                
                const xf = x - Math.floor(x);
                const yf = y - Math.floor(y);
                
                const u = this.fade(xf);
                const v = this.fade(yf);
                
                const a = this.p[xi];
                const aa = this.p[a + yi];
                const ab = this.p[a + yi + 1];
                const b = this.p[xi + 1];
                const ba = this.p[b + yi];
                const bb = this.p[b + yi + 1];
                
                const g1 = this.grad(this.p[aa], xf, yf);
                const g2 = this.grad(this.p[ba], xf - 1, yf);
                const g3 = this.grad(this.p[ab], xf, yf - 1);
                const g4 = this.grad(this.p[bb], xf - 1, yf - 1);
                
                const x1 = this.lerp(u, g1, g2);
                const x2 = this.lerp(u, g3, g4);
                
                return this.lerp(v, x1, x2);
            }
        }
        
        // Draw brain surface
        function drawBrain() {
            const perlin = new PerlinNoise(42);
            
            // Draw using continuous curves
            ctx.strokeStyle = 'rgba(200, 200, 200, 0.6)';
            ctx.lineWidth = 0.8;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            const resolution = 0.5;
            const amplitude = 0.2;
            const frequency = 3;
            
            // Draw horizontal ridge lines
            for (let angle = 0; angle < Math.PI * 2; angle += 0.08) {
                ctx.beginPath();
                let firstPoint = true;
                
                for (let r = 0; r < 1; r += resolution / 100) {
                    // Use polar coordinates
                    const baseX = Math.cos(angle) * r * scale;
                    const baseY = Math.sin(angle) * r * scale;
                    
                    // Add noise distortion
                    const noise = perlin.noise(
                        angle * frequency,
                        r * frequency
                    );
                    
                    const distortion = noise * amplitude * scale;
                    
                    const x = centerX + baseX + Math.cos(angle + Math.PI / 2) * distortion;
                    const y = centerY + baseY + Math.sin(angle + Math.PI / 2) * distortion;
                    
                    if (firstPoint) {
                        ctx.moveTo(x, y);
                        firstPoint = false;
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.stroke();
            }
            
            // Draw concentric circles with distortion
            for (let circle = 0.2; circle < 1; circle += 0.08) {
                ctx.beginPath();
                
                for (let angle = 0; angle < Math.PI * 2; angle += 0.02) {
                    const baseRadius = circle * scale;
                    
                    const noise = perlin.noise(
                        Math.cos(angle) * frequency,
                        Math.sin(angle) * frequency + circle * 2
                    );
                    
                    const radiusVariation = baseRadius + noise * amplitude * 15;
                    
                    const x = centerX + Math.cos(angle) * radiusVariation;
                    const y = centerY + Math.sin(angle) * radiusVariation;
                    
                    if (angle === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();
                ctx.stroke();
            }
            
            // Draw detailed ridge patterns
            ctx.strokeStyle = 'rgba(150, 150, 150, 0.4)';
            ctx.lineWidth = 0.5;
            
            for (let i = 0; i < 50; i++) {
                const startAngle = Math.random() * Math.PI * 2;
                const startRadius = Math.random() * 0.7 + 0.2;
                
                ctx.beginPath();
                
                const startX = centerX + Math.cos(startAngle) * startRadius * scale;
                const startY = centerY + Math.sin(startAngle) * startRadius * scale;
                
                ctx.moveTo(startX, startY);
                
                let currentAngle = startAngle;
                let currentRadius = startRadius;
                
                for (let step = 0; step < 20; step++) {
                    const noise = perlin.noise(
                        currentAngle * 2,
                        currentRadius * 3
                    );
                    
                    currentAngle += (noise - 0.5) * 0.3;
                    currentRadius += (noise - 0.5) * 0.02;
                    
                    currentRadius = Math.max(0.15, Math.min(1, currentRadius));
                    
                    const x = centerX + Math.cos(currentAngle) * currentRadius * scale;
                    const y = centerY + Math.sin(currentAngle) * currentRadius * scale;
                    
                    ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
        }
        
        // Draw outer shell
        function drawShell() {
            const perlin = new PerlinNoise(123);
            
            ctx.strokeStyle = 'rgba(210, 210, 210, 0.7)';
            ctx.lineWidth = 1;
            
            const radius = scale * 1.05;
            
            for (let angle = 0; angle < Math.PI * 2; angle += 0.02) {
                const noise = perlin.noise(
                    Math.cos(angle) * 4,
                    Math.sin(angle) * 4
                );
                
                const radiusVariation = radius + noise * 5;
                
                const x1 = centerX + Math.cos(angle) * radiusVariation;
                const y1 = centerY + Math.sin(angle) * radiusVariation;
                
                const nextAngle = angle + 0.02;
                const nextNoise = perlin.noise(
                    Math.cos(nextAngle) * 4,
                    Math.sin(nextAngle) * 4
                );
                const nextRadiusVariation = radius + nextNoise * 5;
                
                const x2 = centerX + Math.cos(nextAngle) * nextRadiusVariation;
                const y2 = centerY + Math.sin(nextAngle) * nextRadiusVariation;
                
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
        }
        
        // Animation
        function animate() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawBrain();
            drawShell();
            
            requestAnimationFrame(animate);
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        animate();
    </script>
</body>
</html>
